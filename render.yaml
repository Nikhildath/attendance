services:
  # =========================
  # Frontend React App
  # =========================
  - type: static_site
    name: attendance-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SOCKET_URL
        sync: false

# NOTE: Socket.IO server is deployed separately in /socket-server folder
# See /socket-server/README.md for deployment instructions